<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!--    用于设置尺寸适配移动端-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页</title>
    <!--    Semantic的CSS包-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.4.2/dist/semantic.min.css">
    <!--    自定义CSS导入。必须加rel="stylesheet"才可以生效！-->
    <link rel="stylesheet" href="./static/css/index.css">
</head>
<body>
<!--****** 导包 ******-->
<!--    Semantic的JS包-->
<script src="https://cdn.jsdelivr.net/npm/semantic-ui@2.4.2/dist/semantic.min.js"></script>
<!--    JQuery包-->
<script src="https://cdn.staticfile.org/jquery/1.10.2/jquery.min.js"></script>

<!--****** 导航 ******-->
    <!--
    ui:表示调用Semantic的导航模版
    inverted:表示导航采用白色反转的颜色——黑色
    attached:轨道可以依附在主窗口
    -->
<nav class="ui inverted attached segment LenCSS-m-padded-tb-mini">
    <div class="ui container">
        <div class="ui inverted secondary menu">
            <h1 class="ui blue header item">LenCloud</h1>
            <a href="#" class="item"><i class="home icon"></i>首页</a>
            <a href="#" class="item"><i class="idea icon"></i>功能</a>
            <a href="#" class="item"><i class="tags icon"></i>系统</a>
            <a href="#" class="item"><i class="info icon"></i>文章</a>
            <div class="right item">
                <div class="ui icon inverted transparent input">
                    <label>
                        <input type="text" placeholder="搜索内容">
                        <i class="search inverted link icon"></i>
                    </label>
                </div>
            </div>
        </div>
    </div>
</nav>

<!--****** 中间内容 ******-->
<div class="LenCSS-Pad-middle-div1">
    <div class="ui grid">
        <!--        container要包含下面两个侧栏。container可以更好适配屏幕尺寸-->
        <div class="ui container">
            <!--        左侧栏-->
            <div class="eleven wide column">
                <!--                文章列表头部     top attached搭配下面“文章列表本体”，用于让两者连接起来-->
                <div class="ui top attached segment">
                    <!--                    配置grid-->
                    <div class="ui middle aligned two column grid ">
                        <div class="column">
                            <h3 class="ui teal header">文章</h3>
                        </div>
                        <div class="right aligned column">
                            共<h2 class="ui orange header LenCSS-Pad-middle-blog-left-front">99</h2>篇
                        </div>
                    </div>
                </div>

                <!--                左侧栏的文章展示部分-->
                <div class="ui attached segment">

                </div>

                <!--                左侧栏的最底部-->
                <div class="ui bottom attached segment">

                </div>
            </div>

            <!--        右侧栏-->
            <div class="five wide column">

            </div>
        </div>
    </div>
</div>

<!--****** 底部footer ******-->
<footer class="ui inverted vertical segment">
    <div class="ui center aligned container">
<!--        grid一共有16份-->
        <div class="ui inverted divided grid">
            <div class="four wide column">
                <img src="./static/image/index/bottom_code.png" class="ui rounded image" alt="" style="width: 7em">
            </div>

            <div class="ui four wide column">
                <h4 class="ui inverted header LenCSS-Text-little-header">承办方</h4>
                <div class="ui inverted link list">
                    <a href="#" class="item">IOT研究组</a>
                    <a href="#" class="item">UPC地学院</a>
                    <a href="#" class="item">中石油集团</a>
                </div>
            </div>

            <div class="ui four wide column">
                <h4 class="ui inverted header LenCSS-Text-little-header">用户服务</h4>
                <div class="ui inverted link list">
                    <a href="#" class="item">云平台公告</a>
                    <a href="#" class="item">反馈与建议</a>
                    <a href="#" class="item">管理员申请</a>
                </div>
            </div>

            <div class="ui four wide column">
                <h4 class="ui inverted header LenCSS-Text-little-header">关于LenCloud</h4>
                <div class="ui inverted link list">
                    <a href="#" class="item">云平台简介</a>
                    <a href="#" class="item">联系开发者</a>
                    <a href="#" class="item">隐私与政策</a>
                </div>
            </div>
        </div>
        <br>
        <p>Copyright © 2021-2023 LenCloud designed by boyLen</p>
    </div>
</footer>

</body>
</html>
